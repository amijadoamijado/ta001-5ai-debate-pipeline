quality_gates:
  version: "1.0.0"
  description: "8-Stage Quality Gate System for SD002"

gates:
  gate_1_syntax:
    name: "Syntax Validation"
    enabled: true
    blocking: true
    tools:
      - typescript
      - eslint
    criteria:
      - "TypeScript compilation with strict mode"
      - "Zero ESLint errors"
    on_failure: "block_deployment"

  gate_2_type:
    name: "Type Validation"
    enabled: true
    blocking: true
    tools:
      - typescript
    criteria:
      - "Type consistency check"
      - "GAS API type compatibility"
    on_failure: "block_deployment"

  gate_3_lint:
    name: "Lint Validation"
    enabled: true
    blocking: false
    tools:
      - eslint
      - prettier
    criteria:
      - "Code style consistency"
      - "Best practices compliance"
    on_failure: "warn"

  gate_4_security:
    name: "Security Validation"
    enabled: true
    blocking: true
    tools:
      - npm_audit
      - snyk
    criteria:
      - "Zero high/critical vulnerabilities"
      - "GAS permission minimization"
    on_failure: "block_deployment"

  gate_5_test:
    name: "Test Validation"
    enabled: true
    blocking: true
    critical: true
    tools:
      - jest
      - nyc
    criteria:
      - "Unit test coverage >= 80%"
      - "Integration test coverage >= 70%"
      - "E2E test coverage >= 60%"
      - "All tests passing"
      - "Mock GAS environment tests passing"
    on_failure: "block_deployment"

  gate_6_performance:
    name: "Performance Validation"
    enabled: true
    blocking: true
    tools:
      - custom_profiler
    criteria:
      - "GAS execution time < 360s"
      - "Memory usage < 100MB"
      - "API call count optimized"
    on_failure: "block_deployment"

  gate_7_documentation:
    name: "Documentation Validation"
    enabled: true
    blocking: false
    tools:
      - jsdoc
      - custom_validator
    criteria:
      - "API documentation complete"
      - "Deployment procedure documented"
      - "JSDoc coverage >= 90%"
    on_failure: "warn"

  gate_8_integration:
    name: "Integration Validation"
    enabled: true
    blocking: true
    critical: true
    tools:
      - custom_integration_test
    criteria:
      - "All gates passed"
      - "Deployment rehearsal successful"
      - "Rollback procedure verified"
    on_failure: "block_deployment"

enforcement:
  pre_commit: ["gate_1_syntax", "gate_2_type", "gate_3_lint"]
  pre_push: ["gate_1_syntax", "gate_2_type", "gate_4_security", "gate_5_test"]
  pre_deploy: ["all"]

notifications:
  gate_failure:
    enabled: true
    channels: ["console", "log_file"]
  gate_warning:
    enabled: true
    channels: ["console"]
