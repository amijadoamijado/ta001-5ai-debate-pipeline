description = "No description"
prompt = """
# /ralph-wiggum:plan - Weekly Planning

週次計画を作成する。

## Usage

```
/ralph-wiggum:plan [week]
```

## Parameters

| Parameter | Description |
|-----------|-------------|
| `week` | 週番号（例: W02）。省略時は今週 |

## Process

1. **週次ディレクトリ作成**
   ```
   .kiro/ralph/weekly/{YYYY-Www}/
   ├── plan.md
   ├── daily/
   │   ├── mon.md
   │   ├── tue.md
   │   ├── wed.md
   │   ├── thu.md
   │   └── fri.md
   └── review.md
   ```

2. **バックログ確認**
   - `.kiro/ralph/backlog.md` から優先度順にタスクを選択
   - 仕様書参照を確認

3. **日別割り当て**
   - 各日の推定反復数を計算
   - 依存関係を考慮して配置

4. **リスク分析**
   - 複雑なタスクは週中に配置（リカバリー時間確保）
   - 金曜は低リスクタスク推奨

## Output

```markdown
# 週次計画 - 2026年第2週

## 期間
2026-01-06 (Mon) ~ 2026-01-10 (Fri)

## 週次目標
### 必達目標
1. PC002 月次処理完成
2. テストカバレッジ85%達成

### 努力目標
1. ドキュメント整備
2. 技術的負債削減

## リソース配分
| 曜日 | 日中（協調WF） | 夜間（ralph） |
|------|--------------|--------------|
| Mon | PC002設計レビュー | FW003実装 |
| Tue | PC002タスク精査 | PC002 #1-#6 |
...

## 日別キュー割り当て
### Monday
- nightly-queue: daily/mon.md
- 推定反復: 25
- 想定成果: FW003完成
- 仕様参照: .kiro/specs/fw003/
```

## Best Practices

1. **月曜は軽めのタスク**
   - 週の始まりは成功体験を作る
   - 複雑なタスクは週中に配置

2. **依存関係を意識**
   - 前提タスクを先に配置
   - 並行実行可能なタスクを特定

3. **リスク分散**
   - 外部依存タスクは早めに
   - 金曜はリファクタ/Lint等の低リスクタスク

4. **仕様書との紐付け**
   - 各タスクに仕様参照を必須
   - 仕様なしの実装は禁止

## Related Commands

- `/ralph-wiggum:run` - 夜間キュー実行
- `/ralph-wiggum:status` - 実行状況確認

## Files

- `.kiro/ralph/weekly/TEMPLATE/` - テンプレート
- `.kiro/ralph/backlog.md` - バックログ

---

**Phase**: Daytime (Planning)

"""
