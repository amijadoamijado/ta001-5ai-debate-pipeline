## Output Markers

| Marker | Meaning |
|--------|---------|
| `REFACTOR_SESSION_INIT` | Session initialized |
| `REFACTOR_INIT_COMPLETE` | Analysis complete, ready for plan |
| `REFACTOR_ABORTED` | Session cancelled |

