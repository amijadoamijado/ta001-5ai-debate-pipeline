description = "最新のセッション継続記録を読み込み表示"
prompt = """
# セッション読み込み（完全版）

セッション開始時に必要な全ファイルを読み込みます。

## 読み込み順序（必須）

| 順序 | ファイル | 目的 |
|------|---------|------|
| 1 | `D:\\claudecode\\CLAUDE.md` | グローバル設定（UTF-8制約等） |
| 2 | `./CLAUDE.md` | プロジェクト設定（SD002ルール） |
| 3 | `.kiro/sessions/session-current.md` | 現在のセッション（短期記憶） |
| 4 | `.kiro/sessions/TIMELINE.md` | プロジェクト履歴（長期記憶） |

## 実行手順

### Step 1: グローバル CLAUDE.md
```
Read: D:\\claudecode\\CLAUDE.md
```
- UTF-8境界エラー防止ルール
- 日本語ファイル操作制約
- セッション開始プロトコル

### Step 2: プロジェクト CLAUDE.md
```
Read: ./CLAUDE.md
```
- SD002フレームワーク設定
- 技術スタック
- AI協調ワークフロー

### Step 3: session-current.md
```
Read: .kiro/sessions/session-current.md
```
- 前回の作業状況
- 進行中タスク
- P0/P1/P2 優先タスク

### Step 4: TIMELINE.md
```
Read: .kiro/sessions/TIMELINE.md
```
- プロジェクト全体の履歴
- 過去セッションの概要
- 長期的なコンテキスト

## 表示フォーマット

全ファイル読み込み後、以下の形式で要約を表示:

```
📚 セッション読み込み完了

## 1. グローバル設定
✅ CLAUDE.md (グローバル) 読み込み完了
   - UTF-8制約ルール確認

## 2. プロジェクト設定
✅ CLAUDE.md (プロジェクト) 読み込み完了
   - SD002 v[バージョン]

## 3. 現在セッション
📅 前回: [日時]
🌿 ブランチ: [ブランチ名]
📝 コミット: [最新コミット]

### 作業状況
✅ 完了: [N]件
🔄 進行中: [N]件
🔴 未解決: [N]件

### 次回優先 (P0)
[P0タスクリスト]

## 4. プロジェクト履歴
📊 総セッション数: [N]
📆 期間: [開始日] ~ [最終日]
🔧 直近の作業: [概要]

---
🚀 セッション開始準備完了
```

## エラーハンドリング

| ファイル | 存在しない場合 |
|---------|---------------|
| グローバル CLAUDE.md | 警告表示、続行 |
| プロジェクト CLAUDE.md | 警告表示、続行 |
| session-current.md | 「新規セッション」として扱う |
| TIMELINE.md | 「履歴なし」として扱う |

## 関連コマンド

| コマンド | 目的 |
|---------|------|
| `/sessionwrite` | セッション保存（終了時） |
| `/sessionhistory` | 履歴のみ表示 |

---

**実行開始**: 上記4ファイルを順番に読み込み、要約を表示してください。
"""
