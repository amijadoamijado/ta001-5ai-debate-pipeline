description = "AI協調ワークフロー - Codexレビュー依頼作成・実行"
prompt = """
# レビュー依頼: /workflow:review

## 概要
Gemini CLI実装完了後、Codexにレビューを依頼する。
**impl完了後に自動で呼ばれる。手動実行も可能。**

## 使用方法
```
/workflow:review {案件ID} {タスク番号}
```

## 引数
- `案件ID`: 対象案件のID
- `タスク番号`: 実装指示番号（3桁: 001, 002, ...）

## 前提条件
- IMPLEMENT_REQUEST_{タスク番号}.md が存在すること
- Gemini CLIによる実装コミットが完了していること

## 実行手順（全自動・省略禁止）

### Step 1: 実装指示の読み込み
```bash
cat .kiro/ai-coordination/workflow/spec/{案件ID}/IMPLEMENT_REQUEST_{タスク番号}.md
```
レビュー対象のスコープを把握する。

### Step 2: 実装コミットの差分取得
```bash
git log --oneline -3
git diff HEAD~1 --stat
git diff HEAD~1
```
Geminiが実装した変更内容を取得する。

### Step 3: REVIEW_REQUEST_{タスク番号}.md 作成
保存先: `.kiro/ai-coordination/workflow/spec/{案件ID}/REVIEW_REQUEST_{タスク番号}.md`

内容:
```markdown
# レビュー依頼

## 基本情報
- **案件ID**: {案件ID}
- **タスク番号**: {タスク番号}
- **実装者**: Gemini CLI
- **レビュアー**: Codex
- **日時**: {現在日時}

## レビュー対象
- **実装指示**: IMPLEMENT_REQUEST_{タスク番号}.md
- **実装コミット**: {コミットハッシュ}
- **変更ファイル**: {ファイル一覧}

## 変更差分
{git diff の内容}

## レビュー観点
1. 実装指示との整合性
2. TypeScript型安全性
3. テストカバレッジ
4. コード品質（ESLint準拠）
5. エラーハンドリング

## 判定基準
- **Approve**: 全観点でOK → Phase 7（テスト）へ
- **Request Changes**: 修正必要 → Phase 6（修正）へ
```

### Step 4: Codex CLI実行
```bash
REVIEW_CONTENT=$(cat .kiro/ai-coordination/workflow/spec/{案件ID}/REVIEW_REQUEST_{タスク番号}.md)
REVIEW_PROMPT=\"以下のレビュー依頼に従って、実装コードをレビューしてください。判定（Approve/Request Changes）と詳細コメントを出力してください。

${REVIEW_CONTENT}\"
REVIEW_RESULT=$(printf '%s' \"$REVIEW_PROMPT\" | codex exec --full-auto 2>/dev/null)
```

**注意**:
- `codex exec --full-auto` を使用（`codex review --commit` はサンドボックス制限でgit historyにアクセス不可）
- `printf '%s'` を使用（`echo` はバックスラッシュ解釈の問題あり）
- `2>/dev/null` でstderrのUI出力を除外し、stdoutのレビュー結果のみキャプチャする
- 旧形式 `codex --full-auto -p \"...\"` は v0.98.0 で `-p` がprofile指定に変更されたため使用不可

### Step 5: レビュー結果保存
Codexの出力を以下に保存:
```
.kiro/ai-coordination/workflow/review/{案件ID}/REVIEW_IMPL_{タスク番号}.md
```

### Step 6: handoff-log.json 更新
```json
{
  \"timestamp\": \"{現在日時ISO形式}\",
  \"type\": \"review_complete\",
  \"project_id\": \"{案件ID}\",
  \"from\": \"Codex\",
  \"to\": \"Claude Code\",
  \"file\": \"workflow/review/{案件ID}/REVIEW_IMPL_{タスク番号}.md\",
  \"note\": \"{Approve/Request Changes}\"
}
```

### Step 7: PROJECT_STATUS.md 更新
- Approve → Phase 7（テスト）に進行
- Request Changes → Phase 6（修正対応）に移行

### Step 8: 完了報告
```
## Codexレビュー完了

- **案件ID**: {案件ID}
- **タスク番号**: {タスク番号}
- **判定**: {Approve/Request Changes}
- **レビュー結果**: .kiro/ai-coordination/workflow/review/{案件ID}/REVIEW_IMPL_{タスク番号}.md

## 次のアクション
{Approveの場合: テストフェーズへ}
{Request Changesの場合: 修正内容のサマリーと対応方針}
```

## エラー時の対応

| エラー | 原因 | 対応 |
|--------|------|------|
| Codex CLI未インストール | 未セットアップ | `npm install -g @openai/codex` を案内 |
| `stdin is not a terminal` | 非インタラクティブ環境で `codex` 直接実行 | `codex exec --full-auto` を使用 |
| `-p` がprofile扱いになる | v0.98.0で `-p` の意味が変更 | `printf ... \\| codex exec --full-auto` を使用 |
| `unknown revision` | `codex review --commit` のサンドボックス制限 | `codex exec --full-auto` にdiffをパイプで渡す |
| Codex実行失敗（その他） | ネットワーク/API等 | 手動レビューに切り替え |
| レビュー結果が不明瞭 | 出力フォーマット不一致 | Claude Codeが補足レビュー |

## ユーザー入力
$ARGUMENTS

---

**実行開始**: 上記手順に従ってCodexレビューを実行してください。Step 1からStep 8まで全て実行すること。途中で止まることは禁止。
"""
