description = "AI協調ワークフロー - 工程状況の確認・更新"
prompt = """
# 工程状況: /workflow:status

## 概要
案件の工程状況を確認・更新します。

## 使用方法
```
/workflow:status {案件ID} [--update]
```

## 引数
- `案件ID`: 対象案件のID
- `--update`: 状況を更新する場合に指定（省略時は表示のみ）

## 実行手順（表示モード）

### 1. PROJECT_STATUS.md 読み込み
```
.kiro/ai-coordination/workflow/log/{案件ID}/PROJECT_STATUS.md
```

### 2. 関連ファイルの状態確認
- `spec/{案件ID}/` 内のファイル一覧
- `review/{案件ID}/` 内のファイル一覧
- 最新のレビュー結果

### 3. 状況サマリー表示
```
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
案件状況: {案件ID}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

## 基本情報
- 案件ID: {案件ID}
- 開始日: {開始日}
- 最終更新: {最終更新日時}

## 現在のフェーズ
フェーズ {N}: {フェーズ名}
担当: {担当AI}
進捗: {XX}%

## タスク状況
- 完了: {X}件
- 進行中: {X}件
- 未着手: {X}件

## ブロッカー
{あり/なし}
{ある場合は内容を表示}

## 品質ゲート
| ゲート | 状態 |
|--------|------|
| 構文   | {Pass/Fail/-} |
| 型     | {Pass/Fail/-} |
| リント | {Pass/Fail/-} |
| テスト | {Pass/Fail/-} |

## 次のアクション
1. {アクション1}
2. {アクション2}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
```

## 実行手順（更新モード: --update）

### 1. 各ファイルの状態を確認
- `spec/` 内の発注書・実装指示
- `review/` 内のレビュー結果
- git log から最新コミット

### 2. handoff-log.json の最新状態を反映
ハンドオフ履歴から各タスクの状態を更新。

### 3. フェーズ自動判定
| 条件 | フェーズ |
|------|---------|
| WORK_ORDER.md なし | 1: 発注書作成 |
| REVIEW_WORK_ORDER.md なし | 2: 発注書レビュー |
| REVIEW_WORK_ORDER.md が Request Changes | 1: 発注書作成（差戻し） |
| IMPLEMENT_REQUEST なし | 3: 実装指示作成 |
| 実装中タスクあり | 4: 実装 |
| REVIEW_IMPL が Request Changes | 6: 修正対応 |
| 全タスク完了 | 7: 工程完了 |

### 4. PROJECT_STATUS.md 更新
- 最終更新日時を現在に
- フェーズを更新
- タスク進捗を更新
- タイムラインに記録追加

### 5. 更新完了報告
```
## 工程状況更新完了

- **案件ID**: {案件ID}
- **更新日時**: {現在日時}
- **現在のフェーズ**: {フェーズ番号} - {フェーズ名}

## 変更点
- {変更点1}
- {変更点2}

## 次のアクション
{担当AIと具体的なアクション}
```

## 案件一覧表示
引数なしで実行した場合、全案件の一覧を表示:

```
/workflow:status
```

```
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
アクティブ案件一覧
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

| 案件ID | フェーズ | 担当 | 進捗 | 最終更新 |
|--------|---------|------|------|---------|
| {ID1}  | 4       | Gemini CLI | 60% | 2025-12-30 |
| {ID2}  | 2       | Codex | 0% | 2025-12-30 |

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
```

## ユーザー入力
$ARGUMENTS

---

**実行開始**: 上記手順に従って工程状況を確認・更新してください。
"""
